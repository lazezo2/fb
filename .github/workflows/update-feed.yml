name: Blogger Automated Optimizer

on:
  schedule:
    # ⏱️ تايمر الزمن: يعمل تلقائياً كل ساعتين
    - cron: '0 */2 * * *'
  
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-optimization:
    runs-on: ubuntu-latest

    steps:
    # 1. سحب كود المستودع
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. تثبيت بيئة تشغيل نود جي إس 24
    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    # 3. تشغيل السكربت لمعالجة وتوليد الملفات
    - name: Execute Optimization Script
      run: node index.js

    # 4. نقل الملفات العامة إلى مجلد مؤقت لتجهيزها للنشر وحدهم
    - name: Prepare Public Files Only
      run: |
        mkdir public
        mv post.json post-r.json labels public/

    # 5. 🔥 النشر الذكي: نشر محتويات مجلد public فقط إلى فرع gh-pages
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public
