name: Blogger Automated Optimizer

on:
  schedule:
    # ⏱️ تايمر الزمن: يعمل تلقائياً كل ساعتين
    - cron: '0 */2 * * *'
  
  workflow_dispatch: 

# تفعيل بيئة Node.js 24 لمنع التحذيرات الحالية والمستقبلية في 2026
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-optimization:
    runs-on: ubuntu-latest

    steps:
    # 1. سحب كود المستودع
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. تثبيت بيئة تشغيل نود جي إس 24
    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    # 3. تشغيل السكربت لمعالجة الجيسون والملفات
    - name: Execute Optimization Script
      run: node index.js

    # 4. رفع الملفات الجديدة والمحدثة تلقائياً إلى المستودع
    - name: Deploy Updated Feeds to GitHub Pages
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add post.json post-r.json labels/*.json
        git commit -m "Automated feed sync (Node 24) [skip ci]" || exit 0
        git push
